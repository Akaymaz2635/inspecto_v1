<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muayene Raporu</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10pt; color: #222; background: #fff; }

    /* ── Print toolbar (screen only) ── */
    .print-toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      background: #1e293b; color: #e2e8f0; padding: 10px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    .print-toolbar h2 { font-size: 14px; font-weight: 600; flex: 1; }
    .btn-print {
      background: #3b82f6; color: #fff; border: none; border-radius: 6px;
      padding: 7px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .btn-print:hover { background: #2563eb; }
    .btn-close {
      background: transparent; color: #94a3b8; border: none; font-size: 20px;
      cursor: pointer; line-height: 1;
    }
    .report-body { margin-top: 52px; }

    @media print {
      .print-toolbar { display: none !important; }
      .report-body { margin-top: 0; }
    }

    /* ── Page layout ── */
    .page {
      width: 210mm;
      min-height: 297mm;
      page-break-after: always;
      position: relative;
      overflow: hidden;
      background: #fff;
    }
    .page:last-child { page-break-after: auto; }

    /* Landscape override */
    .landscape .page {
      width: 297mm;
      min-height: 210mm;
    }

    @media print {
      .page { page-break-after: always; }
      .page:last-child { page-break-after: auto; }
    }

    /* ── PORTRAIT STYLES ── */
    .portrait .page { padding: 16mm 14mm 14mm; }

    /* Cover page */
    .cover-header {
      border-bottom: 3px solid #1e3a5f;
      padding-bottom: 10px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .cover-title { font-size: 20pt; font-weight: 700; color: #1e3a5f; }
    .cover-sub { font-size: 10pt; color: #64748b; margin-top: 2px; }
    .cover-date { font-size: 9pt; color: #64748b; text-align: right; }

    .info-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
    .info-table td { padding: 5px 8px; font-size: 9.5pt; border: 1px solid #e2e8f0; }
    .info-table td:first-child { font-weight: 600; color: #475569; background: #f8fafc; width: 35%; }

    .summary-boxes {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }
    .summary-box {
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
    }
    .summary-box .sb-val { font-size: 22pt; font-weight: 700; color: #1e3a5f; line-height: 1; }
    .summary-box .sb-lbl { font-size: 8pt; color: #64748b; margin-top: 4px; }
    .sb-green .sb-val { color: #16a34a; }
    .sb-orange .sb-val { color: #d97706; }
    .sb-blue .sb-val { color: #2563eb; }

    .section-title {
      font-size: 10pt; font-weight: 700; color: #1e3a5f;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 4px; margin-bottom: 10px;
    }

    .pareto-wrap { margin-bottom: 16px; }
    .pareto-wrap svg { display: block; }

    .notes-box {
      border: 1px solid #e2e8f0; border-radius: 4px;
      padding: 8px 10px; font-size: 9pt; color: #334155;
      background: #f8fafc; white-space: pre-wrap;
    }

    /* Defect card */
    .defect-card { page-break-before: always; padding: 14mm; }
    .defect-card:first-child { page-break-before: auto; }

    .dc-header {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e3a5f;
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 12px;
    }
    .dc-num { font-size: 14pt; font-weight: 700; }
    .dc-type { font-size: 11pt; font-weight: 600; }
    .dc-disp { margin-left: auto; font-size: 8.5pt; background: rgba(255,255,255,.15); padding: 3px 8px; border-radius: 3px; }

    .measurements-row {
      display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px;
    }
    .mrow-item {
      border: 1px solid #e2e8f0; border-radius: 4px;
      padding: 5px 10px; text-align: center; min-width: 70px;
    }
    .mrow-lbl { font-size: 7.5pt; color: #64748b; }
    .mrow-val { font-size: 11pt; font-weight: 600; color: #1e3a5f; }

    .dc-notes {
      font-size: 9pt; color: #475569; margin-bottom: 10px;
      background: #f8fafc; border-left: 3px solid #94a3b8;
      padding: 6px 10px;
    }

    .photos-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .photos-grid img {
      width: 100%; height: 130mm; object-fit: contain;
      border: 1px solid #e2e8f0; border-radius: 4px;
      background: #f1f5f9;
    }
    .photos-grid.single-photo { grid-template-columns: 1fr; }
    .photos-grid.single-photo img { height: 160mm; }

    .photo-caption {
      font-size: 7.5pt; color: #64748b; text-align: center; margin-top: 2px;
    }

    .disp-history-table {
      width: 100%; border-collapse: collapse; font-size: 8.5pt;
    }
    .disp-history-table th {
      background: #f1f5f9; color: #475569; font-weight: 600;
      padding: 4px 8px; border: 1px solid #e2e8f0; text-align: left;
    }
    .disp-history-table td {
      padding: 4px 8px; border: 1px solid #e2e8f0; vertical-align: top;
    }
    .disp-history-table tr:last-child td { background: #eff6ff; font-weight: 600; }

    /* Page footer */
    .page-footer {
      position: absolute;
      bottom: 8mm; left: 14mm; right: 14mm;
      font-size: 7.5pt; color: #94a3b8;
      display: flex; justify-content: space-between;
      border-top: 1px solid #e2e8f0; padding-top: 4px;
    }

    /* ── LANDSCAPE STYLES ── */
    .landscape .page {
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .ls-header {
      background: #1e3a5f;
      color: #fff;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
    }
    .ls-header-title { font-size: 12pt; font-weight: 700; }
    .ls-header-meta { display: flex; gap: 18px; font-size: 8.5pt; opacity: .85; }
    .ls-header-meta span strong { opacity: 1; }

    .ls-defect-bar {
      background: #2d4a6e;
      color: #cbd5e1;
      padding: 5px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-size: 9pt;
      flex-shrink: 0;
    }
    .ls-defect-bar .ls-defect-id { font-size: 11pt; font-weight: 700; color: #fff; }
    .ls-defect-bar .ls-defect-type { font-weight: 600; color: #93c5fd; }
    .ls-defect-bar .ls-disp-badge {
      margin-left: auto;
      background: rgba(255,255,255,.12);
      padding: 2px 10px; border-radius: 3px;
      font-size: 8.5pt;
    }

    .ls-content { display: flex; flex: 1; min-height: 0; overflow: hidden; }

    /* First page per defect: 58/42 split */
    .ls-photo-pane {
      width: 58%;
      background: #111a24;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .ls-photo-pane img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .ls-photo-stamp {
      position: absolute;
      top: 8px; left: 10px;
      background: rgba(0,0,0,.65);
      color: #fff;
      font-size: 9pt;
      font-family: monospace;
      padding: 3px 8px;
      border-radius: 3px;
    }
    .ls-no-photo {
      color: #4a6080;
      font-size: 11pt;
      font-style: italic;
    }

    .ls-info-pane {
      width: 42%;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .ls-section-label {
      font-size: 8pt;
      font-weight: 700;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }

    .ls-measurements {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
    }
    .ls-mitem {
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 5px 6px;
      text-align: center;
    }
    .ls-mitem .ml { font-size: 7pt; color: #64748b; }
    .ls-mitem .mv { font-size: 10.5pt; font-weight: 700; color: #1e3a5f; }

    .ls-disp-block {
      border: 1px solid #e2e8f0;
      border-radius: 4px;
      padding: 8px 10px;
    }
    .ls-disp-decision {
      font-size: 10pt; font-weight: 700; color: #1e3a5f; margin-bottom: 3px;
    }
    .ls-disp-note { font-size: 8pt; color: #475569; }
    .ls-disp-pending { color: #d97706; }

    .ls-photo-count {
      font-size: 8pt; color: #64748b;
      margin-top: auto;
    }

    .ls-dc-notes {
      font-size: 8.5pt; color: #475569;
      background: #f8fafc; border-left: 3px solid #94a3b8;
      padding: 5px 8px;
      border-radius: 0 4px 4px 0;
    }

    /* Continuation page: 85/15 split */
    .ls-photo-pane-wide {
      width: 85%;
      background: #111a24;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .ls-photo-pane-wide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .ls-info-strip {
      width: 15%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #f8fafc;
      border-left: 1px solid #e2e8f0;
    }
    .ls-is-id { font-size: 18pt; font-weight: 700; color: #1e3a5f; }
    .ls-is-type { font-size: 7.5pt; font-weight: 600; color: #64748b; text-align: center; padding: 0 6px; }
    .ls-is-counter { text-align: center; }
    .ls-is-counter strong { display: block; font-size: 12pt; color: #1e3a5f; font-weight: 700; }
    .ls-is-counter span { font-size: 7pt; color: #94a3b8; }

    .ls-page-footer {
      background: #f1f5f9;
      border-top: 1px solid #e2e8f0;
      padding: 4px 14px;
      font-size: 7.5pt;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      flex-shrink: 0;
    }

    /* Loading state */
    .loading-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14pt;
      color: #64748b;
    }
    .error-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13pt;
      color: #dc2626;
    }

    @media print {
      @page { margin: 0; }
      @page :portrait { size: A4 portrait; }
      @page :landscape { size: A4 landscape; }
    }
  </style>
</head>
<body>
  <div class="print-toolbar" id="toolbar">
    <h2 id="toolbar-title">Muayene Raporu</h2>
    <button class="btn-print" onclick="window.print()">Yazdır / PDF</button>
    <button class="btn-close" onclick="window.close()" title="Kapat">&#x2715;</button>
  </div>
  <div class="report-body" id="report-root">
    <div class="loading-screen">Rapor yükleniyor&hellip;</div>
  </div>
  <script type="module" src="/static/js/report.js"></script>
</body>
</html>
